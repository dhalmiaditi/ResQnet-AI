<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQNet AI — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<header>
    <div class="logo-section">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="ResQNet Logo" class="header-logo">
        <div><h1>ResQNet AI</h1><p class="tagline">Predict. Protect. Respond.</p></div>
    </div>
    <nav>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/sos">SOS</a>
        <a href="/report">Report Hazard</a>
        <a href="/womens_safety" style="color:#e91e8c;">👩 Women's Safety</a>
    </nav>
    <div class="top-controls">
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
        <button class="lang-btn" onclick="setLanguage('hi')">हिंदी</button>
        <button class="theme-btn" onclick="document.body.classList.toggle('light')">🌓</button>
    </div>
</header>

<section class="hero">
    <div class="hero-overlay">
        <h2>Login or Register</h2>
        <p>Create an account to enable SMS alerts to your emergency contact when SOS is triggered.</p>
    </div>
</section>

<div style="padding:20px;">
    <!-- Tab switcher -->
    <div style="max-width:480px;margin:auto;margin-bottom:16px;display:flex;gap:10px;">
        <button class="btn" id="tab-login"    onclick="showTab('login')"    style="flex:1;">Login</button>
        <button class="btn" id="tab-register" onclick="showTab('register')" style="flex:1;background:#16213e;border:1px solid red;color:red;">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="form-box" onsubmit="handleLogin(event)">
        <h3 style="color:red;margin-bottom:20px;">Login to ResQNet</h3>
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <p id="auth-status" style="margin-bottom:10px;font-size:13px;"></p>
        <button type="submit" class="btn" style="width:100%;">Login</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="form-box" onsubmit="handleRegister(event)" style="display:none;">
        <h3 style="color:red;margin-bottom:20px;">Create Account</h3>
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your name" required>
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" required>
        <label>Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="10-digit mobile number">
        <label>Emergency Contact Number <span style="color:#aaa;font-size:11px;">(SMS sent here on SOS)</span></label>
        <input type="tel" id="reg-emergency_contact" placeholder="Family/friend mobile number">
        <p id="reg-auth-status" style="margin-bottom:10px;font-size:13px;"></p>
        <button type="submit" class="btn" style="width:100%;">Create Account</button>
    </form>
</div>

<footer><p>ResQNet AI | DhalmiaDiti</p></footer>
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
function showTab(tab) {
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').style.background    = tab === 'login'    ? 'red' : '#16213e';
    document.getElementById('tab-register').style.background = tab === 'register' ? 'red' : '#16213e';
}
</script>
</body>
</html>
